# Model registry.
#
# Each entry under "models" describes one LLM that the experiment runner can
# instantiate via armad.models.factory.build_llm. The "provider" field selects
# the backend; everything else is forwarded as keyword arguments.
#
# Closed-source providers expect an API key in the .env file (see .env.example).
# Open-source providers run locally and require the optional "open" extras.
#
# The author can pick which entry to use by name from a CLI flag or an
# experiment YAML (e.g.  agents.model: gpt-5.5).

models:
  
  # Closed-source
  gpt-5.4-nano-2026-03-17:
    provider: openai
    model: gpt-5.4-nano-2026-03-17
    temperature: 0.2
    max_tokens: 512
    max_tokens_param: max_completion_tokens

  claude-haiku-4-5:
    provider: openai
    model: claude-haiku-4-5
    temperature: 0.2
    max_tokens: 512


  # vLLM-backed local inference.
  # Use these with scripts/run_*_vllm.sh and the dedicated .venv-vllm env.
  llama-3.1-8b-vllm:
    provider: vllm
    model: /home/dev/hf_cache/imad_models/models--meta-llama--Llama-3.1-8B-Instruct/snapshots/0e9e39f249a16976918f6564b8830bc894c89659
    dtype: bfloat16
    tensor_parallel_size: 1
    gpu_memory_utilization: 0.90
    max_model_len: 8192
    trust_remote_code: false
    enforce_eager: true
    temperature: 0.2
    max_tokens: 512

  qwen2.5-7b-vllm:
